const q = query(collection(db, "vykupy"), orderBy("ts", "desc"));
onSnapshot(q, (snapshot) => {
  const data = [];
  snapshot.forEach(doc => data.push(doc.data()));
  localStorage.setItem('vp_hist', JSON.stringify(data));
  window._fbLoaded = true;
  // Refresh stats if open
  if (document.getElementById('screen-stats').classList.contains('open')) {
    window.renderStats && window.renderStats();
  }
});

// Globální funkce pro uložení do Firebase
window.saveToFirebase = async function(rec) {
  try {
    await addDoc(collection(db, "vykupy"), rec);
    return true;
  } catch(e) {
    console.error("Firebase error:", e);
    return false;
  }
};
</script>

  {l:'STANDARDNÍ', ids:['std15','std15c','std10','std10c','std05','std05c']},
  {l:'100×120',    ids:['x100','x100c','x100r']},
  {l:'OSTATNÍ',    ids:['ohradka','cp3','p8060','viko','koval','plast']},
];
let C={},PR={};
P.forEach(x=>{C[x.id]=0;PR[x.id]=x.p});
try{const s=localStorage.getItem('vp_pr');if(s)Object.assign(PR,JSON.parse(s))}catch(e){}

const fd=d=>(d?new Date(d):new Date()).toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'});
const ft=d=>(d?new Date(d):new Date()).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
const ck=()=>document.getElementById('hdate').innerHTML=`<div>${fd()}</div><div>${ft()}</div>`;
ck();setInterval(ck,30000);

function render(){
  const l=document.getElementById('plist');l.innerHTML='';
  G.forEach(g=>{
    const s=document.createElement('div');s.className='slbl';s.textContent=g.l;l.appendChild(s);
    g.ids.forEach(id=>{
      const x=P.find(q=>q.id===id);
      const sub=C[id]>0?`${C[id]} ks × ${PR[id]} = <strong>${(C[id]*PR[id]).toLocaleString('cs-CZ')} Kč</strong>`:'';
      const r=document.createElement('div');
      const isDmg=['eur_ac','eur_bc','std15c','std10c','std05c','x100c'].includes(id)||id.endsWith('c');r.className='prow'+(isDmg?' damaged':'')+(C[id]>0?' on':'');r.id='r-'+id;
      r.innerHTML=`<div>
        <div class="pname">${x.n}</div>
        <div class="pprrow"><span class="pprlbl">Cena/ks:</span>
          <input class="pprinp" type="number" value="${PR[id]}" onchange="spr('${id}',this.value)" onclick="this.select()" inputmode="numeric">
          <span class="pprlbl">Kč</span></div>
        <div class="psub" id="s-${id}">${sub}</div>
      </div>
      <div class="ksc">
        <button class="kb m" ontouchstart="ev(event);sr('${id}',-1)" ontouchend="ev(event);ss()" ontouchcancel="ss()" onpointerdown="sr('${id}',-1)" onpointerup="ss()" onpointercancel="ss()" onpointerleave="ss()">−</button>
        <input class="kv" type="number" value="${C[id]}" id="k-${id}" oninput="sc('${id}',this.value)" onclick="this.select()" inputmode="numeric" min="0">
        <button class="kb p" ontouchstart="ev(event);sr('${id}',1)" ontouchend="ev(event);ss()" ontouchcancel="ss()" onpointerdown="sr('${id}',1)" onpointerup="ss()" onpointercancel="ss()" onpointerleave="ss()">+</button>
      </div>`;
      l.appendChild(r);
    });
  });
}

function spr(id,v){const n=parseInt(v);if(!isNaN(n)&&n>=0){PR[id]=n;localStorage.setItem('vp_pr',JSON.stringify(PR));rf(id)}}
function sc(id,v){const n=parseInt(v);C[id]=(isNaN(n)||n<0)?0:n;rf(id)}
function ac(id,d){C[id]=Math.max(0,(C[id]||0)+d);const e=document.getElementById('k-'+id);if(e)e.value=C[id];rf(id)}

function rf(id){
  const r=document.getElementById('r-'+id),s=document.getElementById('s-'+id);
  const isDmg2=['eur_ac','eur_bc','std15c','std10c','std05c','x100c'].includes(id)||id.endsWith('c');if(r)r.className='prow'+(isDmg2?' damaged':'')+(C[id]>0?' on':'');
  if(s)s.innerHTML=C[id]>0?`${C[id]} ks × ${PR[id]} = <strong>${(C[id]*PR[id]).toLocaleString('cs-CZ')} Kč</strong>`:'';
  rt();
}

function ev(e){e.preventDefault();e.stopPropagation();}
function rt(){
  let t=0,pc=0;P.forEach(x=>{t+=C[x.id]*PR[x.id];pc+=C[x.id]});
  const e=document.getElementById('tamt');
  e.textContent=t.toLocaleString('cs-CZ')+' Kč';
  e.classList.remove('blink');void e.offsetWidth;e.classList.add('blink');
  document.getElementById('tpcs').textContent=pc+' ks celkem';
  document.getElementById('bconf').disabled=t===0;
}

let rt1,rt2;
let _srActive = false;
function sr(id,d){
  if(_srActive) return;
  _srActive = true;
  ac(id,d);
  rt1=setTimeout(()=>{rt2=setInterval(()=>ac(id,d),120)},500);
}
function ss(){
  clearTimeout(rt1);
  clearInterval(rt2);
  setTimeout(()=>{_srActive=false;},50);
}

function resetAll(){if(!confirm('Resetovat?'))return;P.forEach(x=>{C[x.id]=0});render();rt()}

async function save(){
  const a=P.filter(x=>C[x.id]>0);
  const tot=a.reduce((s,x)=>s+C[x.id]*PR[x.id],0);
  const note=(document.getElementById('ninp').value||'').trim();
  const now=new Date();
  const rec={ts:now.toISOString(),date:fd(now),time:ft(now),total:tot,note,
    items:a.map(x=>({n:x.n,ks:C[x.id],pr:PR[x.id],sub:C[x.id]*PR[x.id]}))};
  
  // Ulož do Firebase (+ automaticky se synchronizuje do localStorage přes listener)
  const bok=document.getElementById('bconf');
  bok.disabled=true;
  if(window.saveToFirebase){
    const ok=await window.saveToFirebase(rec);
    if(!ok){
      const h=gh();h.unshift(rec);localStorage.setItem('vp_hist',JSON.stringify(h.slice(0,200)));
    }
  } else {
    const h=gh();h.unshift(rec);localStorage.setItem('vp_hist',JSON.stringify(h.slice(0,200)));
  }
  // Zápis do Google Sheets přes GET (JSONP workaround)
  const sheetsUrl = 'https://script.google.com/macros/s/AKfycbznkoNg_fEWvrQYnKXAJynd2QOeD0n9DkEQRhQT-safuEpbBjGAOmlJSkuoL9pf3QwA/exec';
  const encoded = encodeURIComponent(JSON.stringify(rec));
  const img = new Image();
  img.src = sheetsUrl + '?data=' + encoded;
  console.log('Sheets request sent');

  // Zápis do pokladny jako výdaj z oficiální kasy
  const now2 = new Date();
  const pkRec = {
    ts: now2.toISOString(),
    date: now2.toLocaleDateString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric'}),
    time: now2.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}),
    typ: 'expense',
    kasa: 'official',
    person: 'Lukáš',
    cat: 'Výkup palet',
    amt: tot,
    note: 'Auto z výkupní appky'
  };
  const pkUrl = 'https://script.google.com/macros/s/AKfycbxKhJnWxpNA5XrqOCWyOGIJK2MTG90htjPVCtJe5iUiaqS6f7ZTLMilX_gmJtV0qZll0g/exec';
  const pkImg = new Image();
  pkImg.src = pkUrl + '?data=' + encodeURIComponent(JSON.stringify(pkRec));
  // Firebase pokladna - přes localStorage frontu
  const pkQueue = JSON.parse(localStorage.getItem('pk_queue')||'[]');
  pkQueue.push(pkRec);
  localStorage.setItem('pk_queue', JSON.stringify(pkQueue));
  console.log('PK queued');

  document.getElementById('ninp').value='';
  closeOv('ov-confirm');
  P.forEach(x=>{C[x.id]=0});render();rt();

function gh(){try{return JSON.parse(localStorage.getItem('vp_hist')||'[]')}catch(e){return[]}}

// Prodejní ceny pro rentabilitu - pamatují si poslední hodnoty
const SELL_PRICES = {};
P.forEach(x => {
  const saved = localStorage.getItem('sp_' + x.id);
  SELL_PRICES[x.id] = saved ? parseFloat(saved) : 0;
});

function saveSellPrice(id, val) {
  const n = parseFloat(val) || 0;
  SELL_PRICES[id] = n;
  localStorage.setItem('sp_' + id, n);
  renderRentabilita();
}

const DAMAGED_IDS = ['eur_ac','eur_bc','std15c','std10c','std05c','x100c','koval','plast'];

function setRentPeriod(days, btn) {
  window._rentDays = days;
  document.querySelectorAll('#stab-rentabilita .ptab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const cr = document.getElementById('rent-custom-range');
  if (days === -1) {
    cr.style.display = 'flex';
    const today = new Date();
    const week = new Date(today - 7*86400000);
    if (!document.getElementById('rent-from').value)
      document.getElementById('rent-from').value = week.toISOString().slice(0,10);
    if (!document.getElementById('rent-to').value)
      document.getElementById('rent-to').value = today.toISOString().slice(0,10);
  } else {
    cr.style.display = 'none';
  }
  renderRentabilita();
}

function filterRent() {
  const h = gh();
  const days = window._rentDays || 0;
  if (days === 0) {
    const t = new Date(); t.setHours(0,0,0,0);
    return h.filter(r => new Date(r.ts) >= t);
  }
  if (days === -1) {
    const from = document.getElementById('rent-from')?.value;
    const to = document.getElementById('rent-to')?.value;
    if (!from || !to) return h;
    const f = new Date(from); f.setHours(0,0,0,0);
    const t = new Date(to); t.setHours(23,59,59,999);
    return h.filter(r => { const d = new Date(r.ts); return d >= f && d <= t; });
  }
  return h.filter(r => new Date(r.ts) >= new Date(Date.now() - days*86400000));
}

function renderRentabilita() {
  // Prodejní ceny inputs
  document.getElementById('rent-prices').innerHTML = P.map(x => {
    const isDmg = DAMAGED_IDS.includes(x.id);
    const margin = SELL_PRICES[x.id] - x.p - (isDmg ? 68 : 13);
    const marginColor = margin > 0 ? 'var(--green)' : margin < 0 ? 'var(--red)' : 'var(--dim)';
    return `<div class="rent-row">
      <div class="rent-name">${x.n}${isDmg?' 🔴':''}</div>
      <input class="rent-inp" type="number" value="${SELL_PRICES[x.id]||''}" placeholder="0"
        inputmode="numeric" onchange="saveSellPrice('${x.id}',this.value)" onclick="this.select()">
      <div class="rent-margin" style="color:${marginColor}">${margin >= 0 ? '+' : ''}${margin} Kč/ks</div>
    </div>`;
  }).join('');

  // Výpočet zisku z filtrovaných dat
  const records = filterRent();

  function calcProfit(recs) {
    let profit = 0;
    recs.forEach(r => {
      r.items.forEach(item => {
        const prod = P.find(x => x.n === item.n);
        if (!prod) return;
        const isDmg = DAMAGED_IDS.includes(prod.id);
        const fixCost = isDmg ? 68 : 13;
        const sellPrice = SELL_PRICES[prod.id] || 0;
        profit += (sellPrice - item.pr - fixCost) * item.ks;
      });
    });
    return profit;
  }

  const profit = calcProfit(records);
  const periodLabel = window._rentDays === 0 ? 'Dnes' :
                      window._rentDays === 7 ? 'Posledních 7 dní' :
                      window._rentDays === 30 ? 'Posledních 30 dní' : 'Vlastní období';

  document.getElementById('rent-result').innerHTML = `
    <div class="profit-card">
      <div>
        <div class="profit-lbl">${periodLabel}</div>
        <div style="font-size:11px;color:var(--dim);margin-top:2px">${records.length} výkupů</div>
      </div>
      <div class="profit-val ${profit >= 0 ? 'pos' : 'neg'}">${profit >= 0 ? '+' : ''}${profit.toLocaleString('cs-CZ')} Kč</div>
    </div>`;
}

let editIdx = -1;

function openEdit(i){
  editIdx = i;
  const h = gh();
  const r = h[i];
  document.getElementById('edit-items').innerHTML = r.items.map((it,j)=>`
    <div class="editrow">
      <div class="editname">${it.n}</div>
      <div class="editinps">
        <div>
          <div class="editlbl">ks</div>
          <input class="editinp" type="number" id="eks-${j}" value="${it.ks}" min="0" inputmode="numeric" oninput="recalcEdit()">
        </div>
        <div>
          <div class="editlbl">Kč/ks</div>
          <input class="editinp" type="number" id="epr-${j}" value="${it.pr}" min="0" inputmode="numeric" oninput="recalcEdit()">
        </div>
      </div>
    </div>`).join('');
  recalcEdit();
  document.getElementById('ov-edit').classList.add('open');
}

function recalcEdit(){
  const h=gh();
  const r=h[editIdx];
  let tot=0;
  r.items.forEach((it,j)=>{
    const ks=parseInt(document.getElementById('eks-'+j)?.value)||0;
    const pr=parseInt(document.getElementById('epr-'+j)?.value)||0;
    tot+=ks*pr;
  });
  document.getElementById('edit-total').textContent=tot.toLocaleString('cs-CZ')+' Kč';
}

function saveEdit(){
  const h=gh();
  const r=h[editIdx];
  let tot=0;
  r.items=r.items.map((it,j)=>{
    const ks=parseInt(document.getElementById('eks-'+j)?.value)||0;
    const pr=parseInt(document.getElementById('epr-'+j)?.value)||0;
    const sub=ks*pr;
    tot+=sub;
    return {...it,ks,pr,sub};
  }).filter(it=>it.ks>0);
  r.total=tot;
  h[editIdx]=r;
  localStorage.setItem('vp_hist',JSON.stringify(h));
  if(window.saveToFirebase){
    // Pro Firebase — přepíšeme celou kolekci není ideální, ale pro malý provoz OK
    // TODO: implementovat update konkrétního dokumentu
  }
  closeOv('ov-edit');
  renderHistory();
  toast('✓ Výkup upraven');
}

function deleteRecord(i){
  if(!confirm('Smazat tento výkup?'))return;
  const h=gh();
  h.splice(i,1);
  localStorage.setItem('vp_hist',JSON.stringify(h.slice(0,200)));
  renderHistory();
  // Refresh stats if open
  if(document.getElementById('screen-stats').classList.contains('open')) renderStats();
  toast('🗑️ Výkup smazán');
}

function filterHist(days) {
  const h = gh();
  if (days === 0) {
    const today = new Date(); today.setHours(0,0,0,0);
    return h.filter(r => new Date(r.ts) >= today);
  }
  const cutoff = new Date(Date.now() - days * 86400000);
  return h.filter(r => new Date(r.ts) >= cutoff);
}

function renderStats() {
  const h = filterHist(statDays);

  // Summary cards
  const total = h.reduce((s,r) => s + r.total, 0);
  const count = h.length;
  const avg = count > 0 ? Math.round(total / count) : 0;
  const totalPcs = h.reduce((s,r) => s + r.items.reduce((a,i) => a + i.ks, 0), 0);

  // Category breakdown
  const catEurIds = ['eur_a','eur_b','eur_ac','eur_bc'];
  const catStdIds = ['std15','std15c','std10','std10c','std05','std05c'];
  const catOstIds = ['x100','x100c','x100r','ohradka','cp3'];
  const cIds = id => catEurIds.includes(id) ? 'eur' : catStdIds.includes(id) ? 'std' : 'ost';

  let eurKs=0, stdKs=0, ostKs=0, healthyKs=0, damagedKs=0;
  h.forEach(r => r.items.forEach(i => {
    const pid = P.find(x => x.n === i.n)?.id || '';
    const cat = cIds(pid);
    if (cat==='eur') eurKs += i.ks;
    else if (cat==='std') stdKs += i.ks;
    else ostKs += i.ks;
    if (pid.endsWith('c')) damagedKs += i.ks;
    else healthyKs += i.ks;
  }));
  const totalCatKs = eurKs + stdKs + ostKs || 1;
  const totalHDKs  = healthyKs + damagedKs || 1;
  const pctEur = Math.round(eurKs/totalCatKs*100);
  const pctStd = Math.round(stdKs/totalCatKs*100);
  const pctOst = Math.round(ostKs/totalCatKs*100);
  const pctHealthy = Math.round(healthyKs/totalHDKs*100);
  const pctDamaged = Math.round(damagedKs/totalHDKs*100);

  document.getElementById('scards').innerHTML = `
    <div class="sc wide">
      <div class="sclbl">Celková útrata</div>
      <div class="scval">${total.toLocaleString('cs-CZ')} Kč</div>
      <div class="scsub">${totalPcs} ks palet celkem</div>
    </div>
    <div class="sc">
      <div class="sclbl">Počet výkupů</div>
      <div class="scval">${count}</div>
    </div>
    <div class="sc">
      <div class="sclbl">Průměr / výkup</div>
      <div class="scval">${avg.toLocaleString('cs-CZ')}</div>
      <div class="scsub">Kč</div>
    </div>
    <div class="sc wide">
      <div class="sclbl">Rozpad ks podle kategorie</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <div style="flex:${pctEur};background:var(--bg3);border-radius:6px;padding:8px 10px;min-width:0">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800">${eurKs} ks</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:1px">EUR</div>
          <div style="font-size:10px;color:var(--dim)">${pctEur} %</div>
        </div>
        <div style="flex:${pctStd};background:var(--bg3);border-radius:6px;padding:8px 10px;min-width:0">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800">${stdKs} ks</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:1px">STD</div>
          <div style="font-size:10px;color:var(--dim)">${pctStd} %</div>
        </div>
        <div style="flex:${pctOst};background:var(--bg3);border-radius:6px;padding:8px 10px;min-width:0">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800">${ostKs} ks</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:1px">OSTATNÍ</div>
          <div style="font-size:10px;color:var(--dim)">${pctOst} %</div>
        </div>
      </div>
    </div>
    <div class="sc wide">
      <div class="sclbl">Zdravé vs. poškozené (-C)</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <div style="flex:${pctHealthy};background:var(--bg3);border-radius:6px;padding:8px 10px;min-width:0">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--green)">${healthyKs} ks</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:1px">ZDRAVÉ</div>
          <div style="font-size:10px;color:var(--dim)">${pctHealthy} %</div>
        </div>
        <div style="flex:${pctDamaged || 1};background:var(--bg3);border-radius:6px;padding:8px 10px;min-width:0">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--red)">${damagedKs} ks</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:1px">POŠKOZENÉ</div>
          <div style="font-size:10px;color:var(--dim)">${pctDamaged} %</div>
        </div>
      </div>
    </div>`;

  // Top pallets
  const palMap = {};
  h.forEach(r => r.items.forEach(i => {
    if (!palMap[i.n]) palMap[i.n] = { ks: 0, kc: 0 };
    palMap[i.n].ks += i.ks;
    palMap[i.n].kc += i.sub;
  }));
  const sorted = Object.entries(palMap).sort((a,b) => b[1].ks - a[1].ks);
  const maxKs = sorted.length > 0 ? sorted[0][1].ks : 1;

  const toplist = document.getElementById('toplist');
  if (sorted.length === 0) {
    toplist.innerHTML = '<div class="nodata">Žádná data pro toto období.</div>';
    return;
  }
  toplist.innerHTML = sorted.map(([name, v]) => `
    <div class="topitem">
      <div class="topname">${name}</div>
      <div class="topbar"><div class="topfill" style="width:${Math.round(v.ks/maxKs*100)}%"></div></div>
      <div class="topks">${v.ks} ks</div>
      <div class="topkc">${v.kc.toLocaleString('cs-CZ')} Kč</div>
    </div>`).join('');
}
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));
}
</script>
</body>
</html>
